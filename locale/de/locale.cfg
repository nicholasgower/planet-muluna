muluna-briefing=Muluna briefing
space-science=Space science on space platforms


[tips-and-tricks-item-description]
muluna-briefing=[planet=muluna] is an endless expanse of grey rock. Meteorites are plentiful on the surface, and they are rich in metals, fuel and water, though reaching those resources require the meteorites be crushed in [entity=crusher] first.\n[entity=metallic-asteroid-chunk]: Primary source of [item=iron-ore]. [entity=carbonic-asteroid-chunk]: Primary source of chemical fuel in the form of [item=carbon].\n[entity=oxide-asteroid-chunk]: Primary source of [fluid=water]. [entity=anorthite-chunk]: Alternative source of [item=copper-cable] and [item=rocket-fuel].\nFuel can not be burned without an artificial source of [fluid=oxygen]. Oil products can not be made here without technologies beyond our current understanding.
space-science=Upon unlocking [item=interstellar-science-pack], It becomes possible to produce [item=space-science-pack] on space platforms using processed asteroid chunks.


[console]
muluna-satellite-radar-invalid-storage=[Muluna] ERROR: Satellite Radar data storage invalid, deleting storage to prevent crash. You might need to place your radars again.
muluna-incompatible-aps-setting=Muluna start and "(Hard) Remove starting cargo pods" settings are incompatible. This save is softlocked. Start a new save with one of these options disabled.
interstellar-science-pack-progress=__3__ progress: __1__/__2__ planetary science packs discovered.
can-not-place-here-unnatural-tile=Can not be placed here. Place directly on top of natural tiles.
muluna-2-message=You have upgraded Muluna to 2.0.0. This is a major breaking update, so back up your old save by saving this map under a new name.\nSpend the next few minutes reviewing your [planet=muluna] factory.\nCheck [item=interstellar-science-pack] factories, [entity=muluna-greenhouse-wood], and other parts of your factory for errors.
technology-enabled=[technology=__1__] enabled.
can-not-place-more-telescopes-X=You can not currently build more than __1__ telescopes per surface.
can-not-place-more-telescopes-1=You can not currently build more than __1__ telescope per surface.
mod-missing-using-placeholder-graphics=Graphics mod "__1__" is not installed. Using placeholder assets. To use this graphics mod, unzip __1__ version __2__, change "factorio_version" in info.json to 2.1, and put the unzipped folder in your mods folder. Do not distribute this modified file.
factorio-update-required=[Muluna] You are likely playing a version of Factorio that is labeled experimental. Early versions of Factorio 2.1.X break fluidboxes on Muluna entities and entities on several other planet mods. This is not an issue any planet modders have control over. Check Muluna's Github repo for more info. https://tinyurl.com/muluna-fluidbox\nTo temporarily fix this issue,  separate fluid networks with [item=pump],[item=valves-overflow],[item=valves-top_up], and [item=valves-one_way].

