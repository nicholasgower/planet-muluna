[technology-description]
space-science-pack=Produktion von [item=space-science-pack] auf [planet=muluna].
muluna-anorthite-processing=Produktion von Aluminium aus [item=anorthite-chunk], das für [item=rocket-fuel] und als alternative Komponente zur Produktion von [item=copper-cable] verwendet werden kann.
muluna-advanced-stone-processing=Nutzung von [item=crusher] um [item=stone] mit höherer Produktivität zu verarbeiten. 
interstellar-science-pack=Technologien für einen tieferen Vorstoß in den Weltraum.
muluna-nanofoamed-polymers=Freigeschaltet durch freischalten von __1__ beliebigen planetaren Wissenschaftspaketen aus der folgenden Liste:
muluna-nanofoamed-polymers-2069=Schalte beliebige __1__ planetare Wissenschaftspakete aus der folgenden Liste frei:
muluna-helium-enrichment=Die Wiederaufbereitung von Helium erlaubt es uns, exotische Technologien zu entdecken.
advanced-space-science-pack=Ermöglicht die Produktion von [item=space-science-pack] im Weltraum.
space-chest-muluna=Eine Kiste, die eine kleine Menge an Gegenständen außerhalb des Frachtraums einer Raumplattform speichern kann.
muluna-cycling-steam-turbine=Eine effizientere Dampfturbine, bei der ein Teil des verbrauchten Dampfs wieder zu Wasser kondensiert wird, um es erneut zu erhitzen.
#Note for localisers: quality here is a thermodynamics joke. If the joke doesn't translate to your language, don't include it. https://en.wikipedia.org/wiki/Vapor_quality
muluna-oxygen=Wenn wir hier etwas verbrennen wollen, werden wir unseren eigenen Sauerstoff herstellen müssen.
muluna-wood-cultivation=Anbau von [item=wood] in einer [entity=chemical-plant]. Einfach einzurichten, aber langsam. Verbraucht [fluid=carbon-dioxide] und stellt [fluid=oxygen] her.
muluna-greenhouses=Spezialisierte Gewächshäuser können [item=wood] und [fluid=oxygen] viel schneller herstellen als Chemiefabriken, müssen aber mit [item=muluna-sapling] bepflanzt werden, bevor sie genutzt werden können.
muluna-gas-venting=Während [item=wood] eine hervorragende Kohlenstoffsenke ist, kann es für sich alleine kein stabiles Kraftwerk aufrechterhalten. In Notsituationen muss überschüssiges Gas abgelassen werden, um einen Spannungsabfall zu verhindern.
muluna-fertilized-greenhouses=Durch Nährstoffe von [planet=gleba] erzielen wir einen höheren Ertrag von [item=wood] in [entity=muluna-greenhouse-wood].
muluna-fertilized-greenhouses-vulcanus=Durch Fluorketon von [planet=aquilo] können wir Bäume auf jeder Oberfläche anbauen und den Ertrag von [item=wood] in [entity=muluna-greenhouse-wood] weiter erhöhen.
asteroid-productivity=Erhöhter Ertrag aus der Zerkleinerung von Asteroiden auf Raumplattformen und auf [planet=muluna].
asteroid-reprocessing=Wiederaufbereitung der Verunreinigungen in Asteroiden um ein passenderes Gleichgewicht an Ressourcen auf Raumplattformen und auf [planet=muluna] zu erzielen.
advanced-asteroid-processing=Erhalte eine eine größere Vielfalt an Ressourcen aus Asteroiden auf Raumplattformen und auf [planet=muluna].
automation-3=Montagemaschinen, die Flüssigkeiten und Daten verarbeiten können und zusätzlich noch schneller sind und mehr Plätze für Module haben.
muluna-space-telescope=Vom zerbrochenen Planeten extrahierte astronomische Daten.
x-asteroid-crushing=Zerkleinere Asteroiden entweder durch einen Zerkleinerer oder von Hand.
muluna-gleba-greenhouses=Baue Gleba-Pflanzen überall an.
muluna-asteroid-upcycling=Nutze astronomische Daten um hochwertige Asteroidenbrocken zu erkennen und zu isolieren.

