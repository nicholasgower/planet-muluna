[item-description]
muluna-satellite-radar=Fungiert als Radar mit unbegrenzter Reichweite, der die Fernansicht von Spielern auf Planeten, die das Satellitenradar umkreist, kartografiert. Verbraucht Energie nur dann, wenn er in Verwendung ist. Satellitenradare von höherer Qualität kartografieren mehr Kacheln und verbrauchen weniger Energie pro kartografierter Kachel.
muluna-greenhouse=Muss in einer Montagemaschine mit einer bestimmten Pflanze bepflanzt werden, bevor es platzierte wird.
low-density-space-platform-foundation=Doppelt so beständig und halb so dicht wie herkömmliche Fundamente für Raumplattformen.
muluna-microcellular-plastic=Kunststoffstange, die mit Milliarden von mikroskopischen Löchern durchsetzt ist. Zeigt ungewöhnliche Materialeigenschaften.
muluna-diffused-plastic=Mit Kohlenstoffdioxid versetzte Kunststoffstange. Das Kohlenstoffdioxid verbleibt nicht sehr lange in der Kunststoffstange, insbesondere nicht ohne fortschrittlichere Fertigungsverfahren. Härtere Metalle oder bessere Chemiefabriken könnten der Schlüssel zur Senkung der Ausfallquote sein.

[alert]
nav-beacon-available=Satellitenradar umkreist __1__.\nDie gesamte Oberfläche kann durch dieses Radar aus der Ferne betrachtet werden.\nDieser Alarm kann in den Mod-Einstellungen pro Spieler deaktiviert werden.
nav-beacon-available-disabled=Satellitenradar umkreist __1__.\nDas Radar ist momentan deaktiviert.\nDieser Alarm kann in den Mod-Einstellungen pro Spieler deaktiviert werden.


