[string-mod-setting]
aps-planet-muluna=[planet=muluna] Muluna


[mod-setting-description]
override-space-connection=Passt die Weltraum-Routen von Nauvis nach Vulcanus, Gleba und Fulgora so an, dass sie über Muluna führen. Der Flug jeder Raumplattform auf dem Weg nach Nauvis wird manuell zurückgesetzt.
space-science-pack-output=Passt die Anzahl Produkte beider Baupläne für Wissenschaftspaket für Weltraumforschung an.
enable-muluna-satellite-radar=Kann bei Aktivierung auf Multiplayer-Servern zu Leistungsproblemen oder zu Möglichkeiten führen, andere Spieler zu belästigen.
muluna-hardcore-restrict-crusher=Beschränkt Zerkleinerer- und Zerkleinerer 2-Baupläne auf Muluna und fügt Aluminiumplatten zum Zerkleinerer-Bauplan hinzu.
muluna-hardcore-restrict-asteroid-collector=Beschränkt Asteroidensammler-Bauplan auf Muluna und fügt Aluminiumplatten zum Asteroidensammler-Bauplan hinzu.
muluna-change-quality-science-pack-drain=Der von Muluna vorgesehene Verbrauch von Wissenschaftspaketen für Weltraumforschung kann deaktiviert werden um die Kompatibilität mit anderen Mods zu wahren.
muluna-hardcore-remove-steam-furnaces=Entfernt die Gebäude "Dampfhochofen" und "Dampfschmelzofen" vom Spiel. Erhöht den Realismus, steigert aber den Schwierigkeitsgrad beim Start auf Muluna ohne externe Lieferungen erheblich.
muluna-hardcore-remove-starting-cargo-pods=Entfernt Mulunas Start-Frachtkapseln. Dies Verunmöglicht den Bau einer Basis auf Muluna ohne externe Lieferungen.
muluna-hardcore-lock-recipe-x=Schafft einen Anreiz für eine kleine wissenschaftliche Infrastruktur vor dem Start der ersten Rakete, indem eine Technologie erst nach der Erforschung der Weltraumforschung freigeschaltet wird.
muluna-easy-simple-wood-gasification=Verdoppelt die Anzahl Produkte bei jedem Schritt der Holzvergasungs-Fertigungskette, untersagt jedoch Produktivitätsmodule.
muluna-hardcore-classic-wood-gasification=Seit Version 2.0 wurde bei Mulunas Holzvergasungs-Fertigungskette ein Schritt entfernt (Holzhackschnitzel). Diese Option stellt diesen Schritt wieder her.
muluna-easy-vanilla-rocket-part-costs=Standardmäßig verdoppelt Muluna die Kosten aller Baupläne für Raketenbauteile, die nicht auf Muluna genutzt werden, verdoppelt die maximal zugelassene Anzahl an Modulen in einem Raketensilo und fügt nach der Erforschung der Weltraumforschung zehn neue Stufen für die Raketenbauteile-Produktivität hinzu. Diese Option macht diese Anpassungen wieder rückgängig.
muluna-easy-wood-gasification-productivity=Erleichtert die Herstellung von Ölprodukten auf Muluna, indem die Produktivität der Holzvergasung durch Hinzufügen einer Technologie erhöht wird. Empfohlen beim Start des Spiels auf Muluna.
muluna-graphics-enable-footstep-animations=Fußstapfen-Partikel benötigen ungefähr 0.01 ms pro Spieler auf Muluna pro Aktualisierung. Auf sehr großen Servern kann dies zu Leistungsproblemen führen.
muluna-easy-simple-nanofoamed-polymers=Vereinfacht die Fertigungskette für nanogeschäumte Polymere, indem mit Kohlenstoffdioxid versetzte Kunststoffstangen erst nach ihrer Herstellung zu verderben beginnen, anstatt bereits dann, wenn mit ihrer Herstellung begonnen wird.
muluna-easy-revert-changes-to-space-platform-technology=Macht auch die Anpassungen an die Triebwerkstechnologien für Raumplattformen rückgängig, so dass Baupläne für Treibstoff und Oxidationsmittel bereits vor dem Erreichen Mulunas verfügbar sind.
muluna-interstellar-science-pack-dynamic-packs-required=Nur die Hälfte (aufgerundet) aller planetaren Wissenschaftspakete, die zur Entdeckung von [technology=interstellar-science-pack] beitragen, werden benötigt. Das übersteuert den fest vorgegebenen Wert.
muluna-alternative-automation-pack-recipe=Erlaubt die Erforschung aller frühen Technologien auf Muluna. Immer aktiviert beim Start des Spiels auf Muluna.
muluna-easy-interstellar-science-pack-compatibility-mode=Das Wissenschaftspaket für Erkundung wird nur bei Muluna-spezifischen Technologien und bei solchen der Endphase hinzugefügt.

[nav-beacon]
single-per-platform=Pro Raumplattformen kann nur genau ein Satellitenradar existieren.

