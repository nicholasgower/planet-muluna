[entity-description]
muluna-advanced-boiler=Ein Heizkessel, der in sauerstofffreien Umgebungen wie beispielsweise [planet=muluna] oder Raumplattformenen betrieben werden kann.
space-heating-tower=Ein Heizturm, der in sauerstofffreien Umgebungen wie beispielsweise [planet=muluna] oder Raumplattformenen betrieben werden kann.
muluna-cycling-steam-turbine=Eine effizientere Dampfturbine, bei der ein Teil des verbrauchten Dampfs wieder zu Wasser kondensiert wird, um es erneut zu erhitzen. Bevorzugt Dampf von höherer Qualität.\n[fluid=steam] Maximaltemperatur: 500 °C\n[fluid=cooled-steam] Temperatur: 100 °C
muluna-rocket-buggy=Ein größeres und schnelleres Auto mit Ausrüstungsraster, bewaffnet mit einem Raketenwerfer.
muluna-vacuum-heating-tower=Erzeugt Wärme aus Brennstoff mit äußerst hohem Wirkungsgrad. Kann auf allen Oberflächen platziert werden, konsumiert allerdings [fluid=oxygen] und erzeugt [fluid=carbon-dioxide].
muluna-telescope-combinator=Blickt ins Universum und sammelt Informationen über die Umgebung des Teleskops.\nAuf Planeten:\n[img=quality.normal]: Eindeutige Kennungen aller Raumplattformen im Orbit\n[img=quality.uncommon]: Zustand aller Raumplattformen im Orbit\n[img=quality.rare]: Falls Raumplattformen den Orbit verlassen können (2) oder falls nicht (1)\nAuf Raumplattformen:\n[img=virtual-signal.signal-I]:Eindeutige Kennung der Raumplattform\n[img=virtual-signal.signal-X]:Aktuelle Position entlang der Weltraum-Route, falls die Plattform unterwegs ist\n[img=virtual-signal.signal-L]:Gesamtlänge der Weltraum-Route, falls die Plattform unterwegs ist\nDas Teleskop gibt zudem für jeden Asteroiden in der Umgebung der Raumplattform ein Signal aus. Bestandteil von [entity=muluna-telescope].
muluna-telescope=Blickt ins Universum und erzeugt Astronomische Daten. Erzeugt mehr Daten an exotischeren Standorten. Sendet zudem Schaltsignale via [entity=muluna-telescope-combinator]. Auf jedem Planeten kann nur genau ein Teleskop platziert werden, auf Raumplattformen hingegen unbegrenzt viele.
muluna-crusher=Ein Zerkleinerer mit Elektromotor. Zerkleinert Gegenstände mit höherer Energieeffizienz.
muluna-burner-roboport=Ein Roboterhangar, der Roboter mit Brennstoff und Oxidationsmittel befüllt anstatt sie mit Strom aufzuladen um Robotern zu ermöglichen, in atmosphärelosen Umgebungen zu fliegen.

[entity-factoriopedia-description]
muluna-telescope-combinator=Blickt ins Universum und sammelt Informationen über die Umgebung des Teleskops.\nAuf Planeten:\n[img=quality.normal]: Eindeutige Kennungen aller Raumplattformen im Orbit\n[img=quality.uncommon]: Zustand aller Raumplattformen im Orbit\n      [font=default-bold]1[/font]: Wartet auf Grundgerüst.\n      [font=default-bold]2[/font]: Grundgerüst wurde vom Logistiknetz angefordert.\n      [font=default-bold]3[/font]: Grundgerüst ist unterwegs.\n      [font=default-bold]4[/font]: Following the path.\n      [font=default-bold]5[/font]: Raumplattform ist bereit dazu, den Planeten zu verlassen und nimmt keine Lieferungen an.\n      [font=default-bold]6[/font]: Keine Stationen im Fahrplan.\n      [font=default-bold]7[/font]: Kein Pfad.\n      [font=default-bold]8[/font]: Wartet bei Station\n      [font=default-bold]9[/font]: Pausiert\n[img=quality.rare]: Falls Raumplattformen den Orbit verlassen können (2) oder falls nicht (1)\nAuf Raumplattformen:\n[img=virtual-signal.signal-I]:Eindeutige Kennung der Raumplattform\n[img=virtual-signal.signal-X]:Aktuelle Position entlang der Weltraum-Route, falls die Plattform unterwegs ist\n[img=virtual-signal.signal-L]:Gesamtlänge der Weltraum-Route, falls die Plattform unterwegs ist\nDas Teleskop gibt zudem für jeden Asteroiden in der Umgebung der Raumplattform ein Signal aus. Bestandteil von [entity=muluna-telescope].

