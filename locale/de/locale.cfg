[mod-setting-description]
override-space-connection=Modifiziert die Verbindungen von Nauvis nach Vulcanus, Gleba und Fulgora, sodass sie über Muluna führen. Dadurch müssen alle Plattformen auf dem Weg nach Nauvis ihren Flug manuell zurücksetzen.
space-science-pack-output=Modifiziert die Ausgabe beider Weltraumforschungspack-Rezepte.
enable-muluna-satellite-radar=Kann Leistungsprobleme verursachen oder im Mehrspielermodus für Griefing missbraucht werden.
muluna-hardcore-restrict-crusher=Begrenzt die Rezepte für den Zerkleinerer und Zerkleinerer 2 auf Muluna und fügt Aluminiumplatten als Bestandteil des Zerkleinerer-Rezepts hinzu.
muluna-hardcore-restrict-asteroid-collector=Begrenzt das Rezept des Asteroiden-Sammlers auf Muluna und fügt Aluminiumplatten als Bestandteil des Rezepts hinzu.
muluna-hardcore-classic-wood-gasification=In 2.0, Die Holzvergasungbauplankette aus Muluna hat einen Schritt von dem Spiel abnehmen. Diese Wahl bringt diesen Schritt zurück.
muluna-easy-simple-wood-gasification=Doppelt die Produktion aller Schritt und verbiete Produktiviätsmoduls im Holzvergasungbauplankette.

