muluna-briefing=Kurzübersicht für Muluna
space-science=Weltraumforschung auf Raumplattformen


[tips-and-tricks-item-description]
muluna-briefing=[planet=muluna] ist eine endlose Weite aus grauem Gestein. Meteoriten sind auf der Oberfläche reichlich vorhanden und enthalten große Mengen an Metallen, Brennstoff und Wasser. Allerdings müssen die Meteoriten zunächst in [entity=crusher] zerkleinert werden, um an diese Ressourcen zu gelangen.\n[entity=metallic-asteroid-chunk]: Hauptquelle für [item=iron-ore]. [entity=carbonic-asteroid-chunk]: Hauptquelle für Brennstoff in der Form von [item=carbon].\n[entity=oxide-asteroid-chunk]: Hauptquelle für [fluid=water]. [entity=anorthite-chunk]: Alternative Quelle für [item=copper-cable] und [item=rocket-fuel].\nBrennstoff kann nicht ohne eine künstliche Quelle von [fluid=oxygen] verbrannt werden. Ölprodukte können hier nicht ohne Technologien hergestellt werden, die unser derzeitiges Verständnis übersteigen.
space-science=Nach der Freischaltung von [item=electromagnetic-science-pack], [item=agricultural-science-pack] und [item=interstellar-science-pack] ist es möglich, unter der Verwendung von verarbeiteten Asteroidenbrocken [item=space-science-pack] auf Raumplattformen herzustellen.


[console]
muluna-satellite-radar-invalid-storage=[Muluna] FEHLER: Satellitenradar-Datenspeicher ungültig, lösche Speicher um einen Absturz zu verhindern. Möglicherweise musst du deine Radare erneut platzieren.
muluna-incompatible-aps-setting=Die Einstellungen Start des Spiels auf Muluna und "(Schwer) Start-Frachtkapseln deaktivieren" sind inkompatibel. Der Speicherstand ist softlocked. Starte ein neues Spiel, bei dem eine dieser beiden Optionen deaktiviert ist.
interstellar-science-pack-progress=__3__ Fortschritt: __1__/__2__ planetare Wissenschaftspakete entdeckt.
can-not-place-here-unnatural-tile=Kann hier nicht platziert werden. Platziere direkt auf natürlichen Kacheln.
muluna-2-message=Du hast Muluna auf Version 2.0.0 aktualisiert. Das ist ein grundlegendes Update, das Inkompatibilitäten verursacht. Deshalb solltest du deinen alten Speicherstand unter einem neuen Namen sichern.\nNutze die kommenden Minuten, um deine Fabrik auf [planet=muluna] zu überprüfen.\nPrüfe [item=interstellar-science-pack] Fabriken, [entity=muluna-greenhouse-wood], und andere Bereiche deiner Fabrik auf Fehler.
technology-enabled=[technology=__1__] aktiviert.
can-not-place-more-telescopes-X=Du kannst momentan nicht mehr als __1__ Teleskope pro Oberfläche bauen.
can-not-place-more-telescopes-1=Du kannst momentan nicht mehr als __1__ Teleskop pro Oberfläche bauen.
mod-missing-using-placeholder-graphics=Grafik-Mod "__1__" ist nicht installiert. Platzhalter werden genutzt. Um diese Grafik-Mod zu nutzen, entzippe __1__ Version __2__, ändere "factorio_version" in info.json auf 2.1 und kopiere den entzippten Ordner in deinen Mods-Ordner. Verbreite diese angepasste Datei nicht.
factorio-update-required=[Muluna] Du spielst wahrscheinlich eine Version von Factorio, die als experimentell gekennzeichnet ist. Frühe Versionen von Factorio 2.1.X sind nicht kompatibel mit den Fluidboxen an Muluna-Objekten und Objekten einiger anderer Planeten-Mods. Darauf haben Planeten-ModderInnen keinen Einfluss. Prüfe Mulunas GitHub-Repository für mehr Informationen. https://tinyurl.com/muluna-fluidbox (Englisch)\nUm das Problem temporär zu lösen, trenne Flüssigkeitsnetzwerke mittels [item=pump], [item=valves-overflow], [item=valves-top_up], und [item=valves-one_way].

[achievement-name]
muluna-moon-is-right=Der Mond steht richtig
