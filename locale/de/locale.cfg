[mod-name]
planet-muluna=○🌐Muluna, Nauvismond


[mod-description]
planet-muluna=Erkunde den Nauvismond Muluna, auf dem sich alles um die Zerkleinerung von Asteroiden dreht, und wage deinen ersten Schritt ins All. Entdecke neue Einsatzbereiche für Zerkleinerer, die nun auf jeder Oberfläche platziert werden können. Nutze das Wissenschaftspaket für Erkundung, um deine Raumplattform upzugraden und noch tiefer in den Weltraum vorzudringen.


[space-location-name]
muluna=Muluna


[space-location-description]
muluna=Nauvis’ größter natürlicher Satellit. Die Oberfläche ist frei von Leben, aber reich an Metallen und Mineralien. Kupfer ist nur schwer zugänglich, doch Aluminium dient in den meisten Fällen als Ersatz. Der Anbau von Pflanzen ist hier nur unter großen Schwierigkeiten möglich.


