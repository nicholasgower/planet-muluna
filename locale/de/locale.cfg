[entity-description]
muluna-advanced-boiler=Ein Heizkessel, der in sauerstofffreien Umgebungen wie beispielsweise [planet=muluna] oder Raumplattformenen betrieben werden kann.
space-heating-tower=Ein Heizturm, der in sauerstofffreien Umgebungen wie beispielsweise [planet=muluna] oder Raumplattformenen betrieben werden kann.
muluna-cycling-steam-turbine=Eine effizientere Dampfturbine, bei der ein Teil des verbrauchten Dampfs wieder zu Wasser kondensiert wird, um es erneut zu erhitzen. Bevorzugt Dampf von höherer Qualität.\n[fluid=steam] Maximaltemperatur: 500 °C\n[fluid=cooled-steam] Temperatur: 100 °C
muluna-rocket-buggy=Ein größeres und schnelleres Auto mit Ausrüstungsraster, bewaffnet mit einem Raketenwerfer.
muluna-vacuum-heating-tower=Generates heat from chemical fuels with an even higher efficiency. Can be used on all surfaces, but consumes [fluid=oxygen] and produces [fluid=carbon-dioxide].
muluna-telescope-combinator=Gazes into the universe, gathering information about the telescope's surroundings.\nOn planets:\n[img=quality.normal]: Index of each space platform in orbit\n[img=quality.uncommon]: State of each space platform in orbit\n[img=quality.rare]: If(2) or if not(1) each platform in orbit can leave\nOn platforms:\n[img=virtual-signal.signal-I]:Index of space platform\n[img=virtual-signal.signal-X]:If on space connection, current position along space connection\n[img=virtual-signal.signal-L]:If on space connection, total length of space connection\nTelescope will also output a signal for every asteroid surrounding the platform. Subcomponent of [entity=muluna-telescope].
muluna-telescope=Gazes into the universe, generating astronomical data. Produces more data in more exotic locations. Also generates circuit signals via [entity=muluna-telescope-combinator]. Only one telescope can be placed per planet, but there is no limit on space platforms.
muluna-crusher=A crusher powered by an electric motor. Crushes items with better energy efficiency.
muluna-burner-roboport=A roboport that fills robots with fuel and oxidizer rather than electricity, allowing robots to fly without an atmosphere.

[entity-factoriopedia-description]
muluna-telescope-combinator=Gazes into the universe, gathering information about the telescope's surroundings.\nOn planets:\n[img=quality.normal]: Index of each space platform in orbit\n[img=quality.uncommon]: State of each space platform in orbit\n      [font=default-bold]1[/font]: Waiting for a starter pack.\n      [font=default-bold]2[/font]: Starter pack was requested from the logistics system.\n      [font=default-bold]3[/font]: Starter pack is on the way.\n      [font=default-bold]4[/font]: Following the path.\n      [font=default-bold]5[/font]: Platform is ready to leave this planet and does not accept deliveries.\n      [font=default-bold]6[/font]: No stations in schedule.\n      [font=default-bold]7[/font]: No path.\n      [font=default-bold]8[/font]: Waiting at a station\n      [font=default-bold]9[/font]: Paused\n[img=quality.rare]: If(2) or if not(1) each platform in orbit can leave\nOn platforms:\n[img=virtual-signal.signal-I]:Index of space platform\n[img=virtual-signal.signal-X]:If on space connection, current position along space connection\n[img=virtual-signal.signal-L]:If on space connection, total length of space connection\nTelescope will also output a signal for every asteroid surrounding the platform. Subcomponent of [entity=muluna-telescope].




muluna-vacuum-heating-tower=Erzeugt Wärme aus festen Brennstoffen mit äußerst hohem Wirkungsgrad. Es kann an allen Oberflächen benutzt werden, doch konsumiert [fluid=oxygen] und macht [fluid=carbon-dioxide].
muluna-telescope=Seht im Universum und macht astronomische Daten. Macht mehr Daten wenn in mehr exotische Planeten. Liefert auch signale mit [entity=muluna-telescope-combinator]. Nur eine Teleskop kann pro Oberflächen platziert werden, aber Plattformen haben keine Grenze.
muluna-telescope-combinator=Seht im Universum und sammelt Informationen von Umgebung dem Teleskop. \nAn Planeten:\n[img=quality.normal]: Index aller Plattform im Orbit\n[img=quality.uncommon]: Zustand aller Plattform im Orbit\n[img=quality.rare]: Wenn(2) order wenn nicht(1) aller Plattform im Orbit kann gehen \nAn Plattformen:\n[img=virtual-signal.signal-I]:Index der Plattforms\n[img=virtual-signal.signal-X]:Wenn an eine Weltraum-Route, augenblickliche Entfernung an die Weltraum-Route\n[img=virtual-signal.signal-L]:Wenn an eine Weltraum-Route, absolute Länge der Weltraum-Route\nTeleskop macht auch eine Signale für jeder Asteroid um die Plattform. Bestanndteil von [entity=muluna-telescope].
muluna-crusher=Ein Zerkleinerer mit Elektroantrieb. Zerkleint Objekten mit höcherer Effizienz.




