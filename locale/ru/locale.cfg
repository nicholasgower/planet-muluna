[technology-description]
muluna-anorthite-processing=Производство алюминия из [item=anorthite-chunk], который затем используется для производства [item=rocket-fuel] и как альтернативный источник [item=copper-cable].
muluna-advanced-stone-processing=[item=crusher] будет перерабатывать [item=stone] с большей продуктивностью.
muluna-helium-enrichment=Переработка гелия позволяет нам исследовать экзотические технологии.
advanced-space-science-pack=Позволяет производить [item=space-science-pack] в космосе.
muluna-greenhouses=Специальные теплицы могут производить [item=wood] и [fluid=oxygen] гораздо быстрее, чем химические заводы, но перед использованием в них необходимо посеять [item=muluna-sapling].
muluna-cycling-steam-turbine=Более эффективная паровая турбина, которая позволяет конденсировать часть потребляемого пара обратно в воду для повторного нагрева. Предпочитает пар более высокого качества.
muluna-oxygen=Если мы хотим сжечь здесь что-нибудь, нам придется самим производить кислород.
muluna-wood-cultivation=Выращивание [item=wood] в [entity=chemical-plant]. Легко запускается, но медленно работает. Потребляет [fluid=carbon-dioxide] и производит [fluid=oxygen].
muluna-gas-venting=Хотя [item=wood] является отличным поглотителем углерода, сама по себе она не может поддерживать стабильную работу электростанции. В чрезвычайных ситуациях необходимо выпускать излишки газа, чтобы предотвратить отключение электричества.
muluna-nanofoamed-polymers=Разблокируется при разблокировании __1__ планетарных научных пакетов из этого списка:
muluna-space-telescope=Астрономические данные, извлечённые из разрушенной планеты.
space-science-pack=Производство [item=space-science-pack] на [planet=muluna].
interstellar-science-pack=Технологии для выхода в дальний космос.
muluna-nanofoamed-polymers-2069=Разблокируйте __1__ __plural_for_parameter__1__{ends in 11,ends in 12,ends in 13,ends in 14=планетарных исследовательских пакетов|ends in 1=планетарный исследовательский пакет|ends in 2,ends in 3,ends in 4=планетарных исследовательских пакета|rest=планетарных исследовательских пакетов}__ из этого списка:
space-chest-muluna=Сундук, в котором можно хранить небольшой запас предметов вдали от грузового отсека корабля.
muluna-fertilized-greenhouses=Питательные вещества с [planet=gleba] позволят нам увеличить урожайность [item=wood] в [entity=muluna-greenhouse-wood].
muluna-fertilized-greenhouses-vulcanus=Фторкетон с [planet=aquilo] позволит нам выращивать деревья на любой поверхности и ещё больше увеличить урожайность [item=wood] в [entity=muluna-greenhouse-wood].
asteroid-productivity=Увеличение выхода от дробления астероидов на космических платформах и на [planet=muluna].
asteroid-reprocessing=Переработайте примеси в астероидах, чтобы получить более подходящий баланс ресурсов на космических платформах и на [planet=muluna].
advanced-asteroid-processing=Получайте более широкий спектр ресурсов из астероидов на космических платформах и на [planet=muluna].
automation-3=Сборочные автоматы, способные обрабатывать жидкие и информационные ингредиенты, с увеличенной скоростью и ячейками для модулей.
x-asteroid-crushing=Измельчайте астероиды в дробилке или руками.

