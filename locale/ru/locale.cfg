[nav-beacon]
single-per-platform=На одной космической платформе может быть только один спутниковый радар.

[tips-and-tricks-item-name]
muluna-briefing=Инструктаж по Мулуне
space-science=Космическая наука на космических платформах

[tips-and-tricks-item-description]
muluna-briefing=[planet=muluna] - это бескрайние просторы серой породы. На поверхности в изобилии встречаются метеориты, богатые металлами, топливом и водой, хотя для получения этих ресурсов необходимо сначала измельчить метеориты в [entity=crusher].\n[entity=metallic-asteroid-chunk]: основной источник [item=iron-ore]. [entity=carbonic-asteroid-chunk]: основной источник химического топлива в виде [item=carbon].\n[entity=oxide-asteroid-chunk]: основной источник [fluid=water]. [entity=anorthite-chunk]: альтернативный источник [item=copper-cable] и [item=rocket-fuel].\nТопливо не может быть сожжено без искусственного источника [fluid=oxygen]. Нефтепродукты не могут быть произведены здесь без технологий, выходящих за рамки нашего нынешнего понимания.
space-science=После разблокировки [item=interstellar-science-pack] становится возможным производить [item=space-science-pack] на космических платформах, используя переработанные куски астероидов.

[console]
muluna-satellite-radar-invalid-storage=[Мулуна] ОШИБКА: Хранилище данных спутниковых радаров недействительно, удаляем хранилище для предотвращения сбоя. Возможно, вам придется разместить радары заново.
muluna-incompatible-aps-setting=Старт на Мулуне и параметр "(Сложно) Убрать стартовые грузовые капсулы" несовместимы. Это сохранение заблокировано. Начните новое сохранение, отключив одну из этих опций.
interstellar-science-pack-progress=Прогресс __3__: __1__/__2__ планетарных исследовательских пакетов открыто.
can-not-place-here-unnatural-tile=Невозможно разместить здесь. Разместите точно над естественными клетками.
muluna-2-message=Вы обновили Мулуну до версии 2.0. Это крупное, меняющее игру обновление, так что сохраните вашу старую игру, дав сохранению этой версии карты новое название.\nПроведите следующие несколько минут, рассматривая вашу фабрику на Мулуне.\nПроверьте заводы, изготавливающие [item=interstellar-science-pack], [entity=muluna-greenhouse-wood], а также другие заводы на предмет возможных ошибок.
technology-enabled=[technology=__1__] включена.
can-not-place-more-telescopes-X=Вы не можете построить более __1__ телескопов на поверхность.
can-not-place-more-telescopes-1=Вы не можете построить более __1__ телескопа на поверхность.
