[mod-name]
planet-muluna=🌐 Мулуна, луна Наувиса

[mod-description]
planet-muluna=Исследуйте луну Наувиса - Мулуну, на которой сосредоточено дробление астероидов, и сделайте свой первый шаг в космос. Откройте для себя новые возможности использования дробилок, которые теперь можно использовать на всех поверхностях. Используйте межзвёздный исследовательский пакет, чтобы модернизировать свои космические платформы и проникнуть ещё дальше в космос.

[space-location-name]
muluna=Мулуна

[space-location-description]
muluna=Крупнейший естественный спутник Наувиса. На его поверхности нет жизни, зато много металлов и минералов. Медь не так легко достать, но алюминий можно использовать в качестве заменителя для большинства вещей. Растения здесь растут с большим трудом.

