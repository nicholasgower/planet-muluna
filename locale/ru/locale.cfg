[item-description]
muluna-satellite-radar=Работает как радар с бесконечным обзором, создаёт карту удалённого обзора планет, над которыми вращается спутниковый радар. Потребляет энергию только во время использования. Радары более высокого качества наносят на карту больше клеток и потребляют меньше энергии за каждую нанесённую клетку.
muluna-greenhouse=Перед размещением необходимо засеять участок выбранной культурой в сборочном автомате.
low-density-space-platform-foundation=В два раза прочнее и в два раза легче, чем стандартный фундамент космической платформы.
muluna-microcellular-plastic=Пластик, содержащий миллиарды микроскопических отверстий. Обладает необычными свойствами материала.
muluna-diffused-plastic=Пластик, наполненный углекислым газом. Этот углекислый газ не задержится в пластике надолго, особенно если не использовать более совершенные технологии производства. Более прочные металлы или более совершенные химические заводы могут стать ключом к снижению количества отказов.

[alert]
