[entity-description]
muluna-advanced-boiler=Бойлер, который может работать без кислорода, в таких местах, как [planet=muluna] и космические платформы.
space-heating-tower=Нагревательная башня, которая может работать без кислорода, в таких местах, как [planet=muluna] и космические платформы.
muluna-cycling-steam-turbine=Более эффективная паровая турбина, которая позволяет конденсировать часть потребляемого пара обратно в воду для повторного нагрева. Предпочитает пар более высокого качества.\n[fluid=steam] макс. температура: 500 °C\n[fluid=cooled-steam] температура: 100 °C
muluna-rocket-buggy=Более быстрый и большой автомобиль, оборудованный ракетной установкой и сеткой для снаряжения.
muluna-vacuum-heating-tower=Генерирует тепло из химического топлива с ещё большей эффективностью. Может использоваться на любых поверхностях, но потребляет [fluid=oxygen] и производит [fluid=carbon-dioxide].
muluna-telescope=Вглядывается во Вселенную, генерируя астрономические данные. Производит больше данных в более экзотических местах. Также генерирует логические сигналы через [entity=muluna-telescope-combinator]. На одной планете можно разместить только один телескоп, но на космических платформах ограничений нет.
muluna-telescope-combinator=Вглядывается во Вселенную, собирая информацию об окружающем телескоп пространстве.\nНа планетах:\n[img=quality.normal]: Индекс каждой космической платформы на орбите\n[img=quality.uncommon]: Состояние каждой космической платформы на орбите\n[img=quality.rare]: Если(2) или если не(1), каждая платформа на орбите может улететь\nНа платформах:\n[img=virtual-signal.signal-I]: Индекс космической платформы\n[img=virtual-signal.signal-X]: Если на космическом маршруте, текущее положение вдоль маршрута\n[img=virtual-signal.signal-L]: Если на космическом маршруте, общая длина маршрута\nТелескоп также выдаст сигнал для каждого астероида рядом с платформой. Подкомпонент для [entity=muluna-telescope].
muluna-crusher=Дробилка с приводом от электромотора. Измельчает предметы с лучшей энергоэффективностью.

