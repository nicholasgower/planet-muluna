[mod-setting-description]
override-space-connection=Изменяет маршруты от Наувиса до Вулкана, Глебы и Фульгоры, чтобы они проходили через Мулуну. Все платформы на пути к Наувису нужно будет перезапустить вручную.
space-science-pack-output=Модификатор выхода обоих рецептов космического исследовательского пакета.
enable-muluna-satellite-radar=При включении на многопользовательских серверах могут возникнуть проблемы с производительностью или потенциальная опасность для грифинга.
muluna-hardcore-restrict-crusher=Ограничивает рецепты Дробилки и Дробилки 2 только для Мулуны и добавляет алюминиевые плиты в рецепт дробилки.
muluna-hardcore-restrict-asteroid-collector=Ограничивает рецепт Сборщика астероидов только для Мулуны и добавляет алюминиевые плиты в рецепт сборщика.
muluna-hardcore-remove-steam-furnaces=Удаляет из игры здания "Каменная паровая печь" и "Стальная паровая печь". Повышает реалистичность, но значительно увеличивает сложность старта на Мулуне без внешних поставок.
muluna-hardcore-remove-starting-cargo-pods=Удаляет стартовые грузовые капсулы Мулуны. Это делает невозможным запуск базы Мулуны без внешних поставок.
muluna-hardcore-classic-wood-gasification=В версии 2.0 из цепочки производств Мулуны по газификации древесины был удалён один шаг (Измельчённая древесина). Эта опция восстанавливает этот шаг.
muluna-change-quality-science-pack-drain=Для сохранения совместимости с другими модами можно отключить скорость расходования научного пакета Мулуны.
muluna-alternative-automation-pack-recipe=Позволяет полностью исследовать ранние технологии на Мулуне. Всегда включено при начале игры с Мулуны.
muluna-easy-vanilla-rocket-part-costs=По умолчанию Мулуна удваивает стоимость всех рецептов деталей ракеты, которые не используются на Мулуне, удваивает максимальное количество модулей, которые может использовать ракетная шахта, и добавляет десять новых уровней технологии продуктивности деталей ракеты, которые становятся доступны после разблокирования космической науки. Эта опция отменяет данное изменение.
muluna-easy-simple-wood-gasification=Удваивает выход каждого шага в цепочке газификации древесины при отказе от модулей продуктивности.
muluna-easy-simple-nanofoamed-polymers=Упрощает цепочку производства нановспененных полимеров, делая так, чтобы порча диффузионного пластика начиналась в момент готовности, а не в начале создания.
muluna-easy-wood-gasification-productivity=Уменьшает сложность производства нефтепродуктов на Мулуне, добавляя технологию, повышающую продуктивность газификации древесины. Рекомендуется при игре со старта на Мулуне.
muluna-interstellar-science-pack-dynamic-packs-required=Исследование половины (с округлением в большую сторону) всех планетарных исследовательских пакетов приводит к разблокировке [technology=interstellar-science-pack]. Это отменяет жёстко заданное значение.
muluna-easy-revert-changes-to-space-platform-technology=Также отменяются изменения в технологии ускорителей космических платформ, чтобы стандартные рецепты топлива/окислителя для ускорителей были доступны до достижения Мулуны.
muluna-graphics-enable-footstep-animations=Частицы отпечатков потребляют примерно 0,01 мс на каждого игрока на Мулуне при обновлении кадра. На крупных серверах могут возникнуть проблемы с производительностью.
muluna-hardcore-lock-recipe-x=Стимулирует небольшое научное строительство перед запуском первой ракеты, блокируя технологию космической наукой.

