[mod-setting-description]
require-gleba-for-greenhouse-tech=在句芒星被发现之前，无法研究温室科技。
tree-seed-probability=砍树时掉落种子的平均概率（范围：0-1）。
override-space-connection=修改新地星到祝融星、句芒星和雷神星的航线，使其经过微月星。将使每个前往新地星的平台的飞行状态手动重置。
space-science-pack-output=修改两个太空科技包配方的产出数量。
enable-muluna-satellite-radar=在多人服务器上启用时可能导致性能问题或被恶意利用。
muluna-hardcore-restrict-crusher=将破碎机和破碎机2的配方限制在微月星，并在破碎机配方中添加铝板。
muluna-hardcore-restrict-asteroid-collector=将星岩抓取臂的配方限制在微月星，并在星岩抓取臂配方中添加铝板。
muluna-change-quality-science-pack-drain=可禁用微月星预设的科技包消耗速率以保持与其他模组的兼容性。
muluna-hardcore-remove-steam-furnaces=移除游戏中的「蒸汽石炉」和「蒸汽钢炉」建筑。增加了真实感，但在没有外部支援的情况下，微月星开荒难度大幅增加。
muluna-hardcore-remove-starting-cargo-pods=移除微月星的初始货舱。这使得在没有外部支援的情况下无法在微月星建立基地。
muluna-hardcore-lock-recipe-x=通过将一项科技锁定在太空科技包后面，激励在发射第一枚火箭前进行小规模科技建设。
muluna-easy-simple-wood-gasification=将木材气化制作链中每一步的产出翻倍，同时禁止使用产能插件。
muluna-hardcore-classic-wood-gasification=在2.0版本中，微月星的木材气化制作链移除了一个步骤（木屑粉碎）。此选项将恢复该步骤。
muluna-easy-vanilla-rocket-part-costs=默认情况下，微月星会将所有不在微月星上使用的火箭组件配方成本翻倍，将火箭发射井的最大插件槽数量翻倍，并增加十个新的火箭组件增产科技等级（在太空科技解锁后可用）。此选项可撤销这些更改。
muluna-easy-wood-gasification-productivity=通过添加提高木材气化产能的科技来降低在微月星上生产石油产品的难度。推荐在微月星开局时使用。
muluna-graphics-enable-footstep-animations=脚步粒子在微月星上每次更新每个玩家消耗约0.01毫秒。在大型服务器上可能导致性能问题。
muluna-easy-simple-nanofoamed-polymers=简化了纳米泡沫聚合物的制作链，使扩散塑料的变质从制作完成时开始计算，而非开始制作时。
muluna-easy-revert-changes-to-space-platform-technology=也回退了太空平台推进器科技的更改，使得在到达微月星之前可以使用标准推进器燃料/氧化剂配方。
muluna-interstellar-science-pack-dynamic-packs-required=所有有助于发现[technology=interstellar-science-pack]的行星科技包中，将要求向上取整的一半数量，覆盖硬编码值。
muluna-alternative-automation-pack-recipe=允许在微月星上完全研究早期科技。微月星开局时始终启用。

