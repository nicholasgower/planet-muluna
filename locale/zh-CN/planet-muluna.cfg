[item-description]
I-greenhouse=用于种植和收获的__ITEM__I-greenhouse__
muluna-satellite-radar=作为具有无限范围的雷达，绘制导航卫星所绕行星上玩家的远程视图。只有在使用时才消耗能量。更高品质的雷达绘制更多区块，且每绘制一个区块消耗更少能量。
muluna-greenhouse=必须在组装机中放入特定作物的种子后才能放置。
low-density-space-platform-foundation=相比标准太空平台基座，耐久翻倍，密度减半。
muluna-microcellular-plastic=含有数十亿微孔的塑料，具有独特的材料特性。
muluna-diffused-plastic=掺入二氧化碳的塑料。这些二氧化碳不会在塑料中停留太久，尤其是没有更先进的制造技术时。更坚硬的金属或更好的化工厂可能是降低失败率的关键。

