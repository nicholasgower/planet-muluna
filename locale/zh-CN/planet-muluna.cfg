[technology-description]
wood-gas-processing=木材气化工艺可以利用化工厂将木材转化为石油气和焦油。焦油可以在化工厂中制成固体燃料。
wood-gas-processing-to-crude-oil=焦油再加工利用焦油和水制取原油。
advanced-wood-gas-processing=高级木材气化工艺可以利用炼油厂将木材和水转化为重油、轻油和石油气。
space-science-pack=在[planet=muluna]上生产[item=space-science-pack]。
muluna-anorthite-processing=从[item=anorthite-chunk]中提取铝，可用作[item=rocket-fuel]和[item=copper-cable]的替代来源。
muluna-advanced-stone-processing=使用[item=crusher]以更高产能加工[item=stone]。
interstellar-science-pack=研究深入星空的科技。
muluna-nanofoamed-polymers=从以下列表中解锁任意__1__个行星科技包后解锁：
