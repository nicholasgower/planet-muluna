[entity-factoriopedia-description]
muluna-telescope-combinator=凝视宇宙，收集望远镜周围的信息。\n在行星上：\n[img=quality.normal]：轨道上每个太空平台的索引\n[img=quality.uncommon]：轨道上每个太空平台的状态\n      [font=default-bold]1[/font]：等待启动包\n      [font=default-bold]2[/font]：已向物流系统请求启动包\n      [font=default-bold]3[/font]：启动包运送中\n      [font=default-bold]4[/font]：沿航线航行中\n      [font=default-bold]5[/font]：平台已准备好离开此星球，不再接收货物\n      [font=default-bold]6[/font]：时刻表中无站点\n      [font=default-bold]7[/font]：无可行路径\n      [font=default-bold]8[/font]：在站点等待\n      [font=default-bold]9[/font]：已暂停\n[img=quality.rare]：轨道上每个平台是否可以离开（2表示可以，1表示不可以）\n在平台上：\n[img=virtual-signal.signal-I]：太空平台的索引\n[img=virtual-signal.signal-X]：如果在空间连接上，当前在空间连接上的位置\n[img=virtual-signal.signal-L]：如果在空间连接上，空间连接的总长度\n望远镜还会为平台周围的每个小行星输出一个信号。[entity=muluna-telescope]的子组件。

