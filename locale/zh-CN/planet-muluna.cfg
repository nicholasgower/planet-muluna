[tips-and-tricks-item-description]
muluna-briefing=[planet=muluna] 是一片无边无际的灰色岩石。地表陨石丰富，富含金属、燃料和水，但获取这些资源需要先用[entity=crusher]粉碎陨石。\n[entity=metallic-asteroid-chunk]：是[item=iron-ore]的主要来源。[entity=carbonic-asteroid-chunk]：是以[item=carbon]形式存在的化学燃料的主要来源。\n[entity=oxide-asteroid-chunk]：是[fluid=water]的主要来源。[entity=anorthite-chunk]：是[item=copper-cable]和[item=rocket-fuel]的替代来源。\n如果没有人工提供的[fluid=oxygen]，燃料就无法燃烧。以我们目前的技术，无法在这里生产石油产品。
space-science=解锁[item=interstellar-science-pack]后，就可以使用处理过的星岩在太空平台上生产[item=space-science-pack]。

