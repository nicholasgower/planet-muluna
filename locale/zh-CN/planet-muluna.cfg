muluna-helium-enrichment=再处理氦气让我们能够探索奇异科技。
advanced-space-science-pack=允许在太空中生产[item=space-science-pack]。
space-chest-muluna=一种可在远离飞船货舱的地方存储少量物品的箱子。
muluna-cycling-steam-turbine=更高效的蒸汽轮机，可将部分消耗的蒸汽冷凝后重新加热。偏好更高品质的蒸汽。
muluna-oxygen=如果想在这里燃烧任何东西，我们就需要自己制造氧气。
muluna-wood-cultivation=在[entity=chemical-plant]中栽培[item=wood]。易于安置，但速度缓慢。消耗[fluid=carbon-dioxide]并产生[fluid=oxygen]。
muluna-greenhouses=专用温室可以比化工厂更快地生产[item=wood]和[fluid=oxygen]，但在使用前必须先播种[item=muluna-sapling]。
muluna-gas-venting=虽然[item=wood]是良好的碳汇，但它本身无法维持稳定的发电厂。紧急情况下必须排放多余气体以防止电力短缺。
muluna-fertilized-greenhouses=来自句芒星[planet=gleba]的营养素可以增加[entity=muluna-greenhouse-wood]中的[item=wood]产量。
muluna-fertilized-greenhouses-vulcanus=来自玄冥星[planet=aquilo]的氟酮让我们可以在任何表面种植树木，并进一步提高[entity=muluna-greenhouse-wood]中的[item=wood]产量。
asteroid-productivity=提高在太空平台和微月星[planet=muluna]上粉碎星岩的产量。
asteroid-reprocessing=在太空平台和微月星[planet=muluna]上重新处理星岩中的杂质，以获得更合适的资源配比。
advanced-asteroid-processing=在太空平台和微月星[planet=muluna]上从星岩中获取更广泛的资源。
automation-3=能够处理流体和数据原料的组装机，具有额外的速度和插件槽。
muluna-space-telescope=从破碎星球提取的天文数据。
x-asteroid-crushing=在破碎机中或手动粉碎星岩。
muluna-gleba-greenhouses=在任何地方种植句芒星作物。

