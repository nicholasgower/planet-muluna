[string-mod-setting]
aps-planet-muluna=[planet=muluna] Muluna


[mod-setting-description]
override-space-connection=Zmienia trasę połączeń z Nauvis do Vulcanus, Gleba i Fulgora tak, aby przebiegały przez Mulunę. Spowoduje to konieczność ręcznego zresetowania lotu każdej platformy zmierzającej do Nauvis.
space-science-pack-output=Modyfikuje wydajność obu receptur z kosmicznego pakietu naukowego.
enable-muluna-satellite-radar=Może powodować problemy z wydajnością lub potencjalne nadużycia, gdy jest włączone na serwerach wieloosobowych.
muluna-hardcore-restrict-crusher=Ogranicza receptury kruszarki i kruszarki 2 do Muluny oraz dodaje płytki aluminiowe do receptury kruszarki.
muluna-hardcore-restrict-asteroid-collector=Ogranicza przepis na zbieracz asteroid do Muluny i dodaje płytki aluminiowe do przepisu na zbieracz asteroid.
muluna-change-quality-science-pack-drain=Można wyłączyć zamierzone tempo zużycia pakietów naukowych na Mulunie, aby zachować kompatybilność z innymi modami.
muluna-hardcore-remove-steam-furnaces=Usuwa z gry budynki „Kamienny piec parowy” i „Stalowy piec parowy”. Zwiększa realizm, ale znacznie podnosi trudność rozpoczęcia gry na Mulunie bez zewnętrznych dostaw.
muluna-hardcore-remove-starting-cargo-pods=Usuwa początkowe kapsuły ładunkowe Muluny. Uniemożliwia to rozpoczęcie budowy bazy na Mulunie bez zewnętrznych dostaw.
muluna-hardcore-lock-recipe-x=Zachęca do niewielkiej rozbudowy naukowej przed wystrzeleniem pierwszej rakiety poprzez zablokowanie technologii wymagającej nauki kosmicznej.
muluna-easy-simple-wood-gasification=Podwaja wydajność każdego etapu procesu zgazowania drewna, jednocześnie blokując moduły zwiększające wydajność.
muluna-hardcore-classic-wood-gasification=W wersji 2.0 z łańcucha produkcji związanego ze zgazowaniem drewna w grze usunięto jeden etap (Rozdrobnione drewno). Ta opcja przywraca ten etap.
muluna-easy-vanilla-rocket-part-costs=Domyślnie Muluna podwaja koszt wszystkich receptur części rakietowych, które nie są używane w Mulunie, podwaja maksymalną liczbę modułów, z których może korzystać silos rakietowy, oraz dodaje dziesięć nowych poziomów technologii wydajności części rakietowych, dostępnych po odblokowaniu nauki o kosmosie. Ta opcja cofa te zmiany.
muluna-easy-wood-gasification-productivity=Zmniejsza trudność produkcji produktów ropopochodnych na Mulunie poprzez dodanie technologii zwiększającej wydajność zgazowania drewna. Zalecane podczas gry z opcją start na Mulunie.
muluna-graphics-enable-footstep-animations=Cząsteczki kroków zużywają około 0,01 ms na gracza na Mulunie na każdą aktualizację. Na dużych serwerach może to prowadzić do problemów z wydajnością.
muluna-easy-simple-nanofoamed-polymers=Upraszcza łańcuch wytwarzania polimerów nanopienistych, sprawiając, że psucie się rozproszonego plastiku zaczyna się w momencie wytworzenia, a nie w momencie rozpoczęcia wytwarzania.
muluna-easy-revert-changes-to-space-platform-technology=Cofa również zmiany w technologii silników platformy kosmicznej, aby standardowe receptury paliwa/utleniacza do silników były dostępne przed dotarciem do Muluny.
muluna-interstellar-science-pack-dynamic-packs-required=Wymagana będzie połowa (zaokrąglona w górę) wszystkich pakietów naukowych dotyczących planet, które przyczyniają się do odkrycia [technology=interstellar-science-pack], co zastąpi wartość stałą.
muluna-alternative-automation-pack-recipe=Umożliwia pełne zbadanie wczesnych technologii na Mulunie. Zawsze włączone przy starcie na Mulunie.


[nav-beacon]
single-per-platform=Na każdej platformie kosmicznej może istnieć tylko jeden radar satelitarny.


[tips-and-tricks-item-name]
muluna-briefing=Odprawa dotycząca Muluny
space-science=Nauka kosmiczna na platformach kosmicznych


[tips-and-tricks-item-description]
muluna-briefing=[planet=muluna] to niekończąca się przestrzeń szarej skały. Na powierzchni występuje mnóstwo meteorytów, które są bogate w metale, paliwo i wodę, jednak aby dotrzeć do tych zasobów, meteoryty należy najpierw rozdrobnić w [entity=crusher].\n[entity=metallic-asteroid-chunk]: Główne źródło [item=iron-ore]. [entity=carbonic-asteroid-chunk]: Główne źródło paliwa chemicznego w postaci [item=carbon].\n[entity=oxide-asteroid-chunk]: Główne źródło [fluid=water]. [entity=anorthite-chunk]: Alternatywne źródło [item=copper-cable] i [item=rocket-fuel].\ Paliwo nie może być spalane bez sztucznego źródła [fluid=oxygen]. Produkty ropopochodne nie mogą być tutaj wytwarzane bez technologii wykraczających poza nasze obecne zrozumienie.
space-science=Po odblokowaniu [item=interstellar-science-pack] możliwe staje się wytwarzanie [item=space-science-pack] na platformach kosmicznych przy użyciu przetworzonych fragmentów asteroid.


[console]
muluna-satellite-radar-invalid-storage=[Muluna] BŁĄD: Nieprawidłowy zapis danych radaru satelitarnego, usuwanie zapisu w celu zapobieżenia awarii. Być może konieczne będzie ponowne umieszczenie radarów.
muluna-incompatible-aps-setting=Ustawienia Muluna start i „(Trudne) Usuń początkowe kapsuły ładunkowe” są niezgodne. Ten zapis jest zablokowany. Rozpocznij nowy zapis z wyłączoną jedną z tych opcji.
interstellar-science-pack-progress=__3__ postęp: odkryto __1__/__2__ pakietów naukowych o planetach.
can-not-place-here-unnatural-tile=Nie można umieścić tutaj. Umieść bezpośrednio na naturalnych kafelkach.
muluna-2-message=Zaktualizowałeś Muluna do wersji 2.0.0. Jest to poważna aktualizacja powodująca niekompatybilność, więc wykonaj kopię zapasową starego zapisu, zapisując tę mapę pod nową nazwą.\nPoświęć kilka następnych minut na sprawdzenie fabryki na [planet=muluna].\nSprawdź fabryki [item=interstellar-science-pack], [entity=muluna-greenhouse-wood] i inne części swojej fabryki pod kątem błędów.
technology-enabled=Włączono [technology=__1__].
can-not-place-more-telescopes-X=Obecnie nie możesz zbudować więcej niż __1__ teleskopów na powierzchni.
can-not-place-more-telescopes-1=Obecnie nie możesz zbudować więcej niż __1__ teleskopu na powierzchni.
