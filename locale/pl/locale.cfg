global-advanced-boiler-quality-description=[img=quality.__1__] Wydajność: [font=default-bold]__2__%[/font]
muluna-regolith-digging=Umieść wiertnicę górniczą w dowolnym miejscu na [planet=muluna], gdzie nie ma w pobliżu zasobów, aby rozpocząć wydobywanie regolitu. Niepotrzebny [item=stone-crushed] można usunąć, zakopując go w księżycowej ziemi za pomocą narzędzia do wbijania lub umieszczając go jako kafelek. Inne niepotrzebne przedmioty można również zakopać w podobny sposób.


