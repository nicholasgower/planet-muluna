[technology-description]
space-science-pack=Produkcja [item=space-science-pack] na [planet=muluna].
muluna-anorthite-processing=Produkcja aluminium z [item=anorthite-chunk], które może być wykorzystane jako [item=rocket-fuel] oraz alternatywne źródło [item=copper-cable].
muluna-advanced-stone-processing=Wykorzystanie [item=crusher] do przetwarzania [item=stone] z większą wydajnością.
interstellar-science-pack=Technologie umożliwiające dalsze eksploracje kosmosu.
muluna-nanofoamed-polymers=Odblokowuje się po odblokowaniu dowolnego __1__ pakietu naukowego planety z poniższej listy:
muluna-nanofoamed-polymers-2069=Odblokuj dowolny __1__ pakiet naukowy planety z poniższej listy:
muluna-helium-enrichment=Przetwarzanie helu pozwala nam badać egzotyczne technologie.
advanced-space-science-pack=Umożliwia produkcję [item=space-science-pack] w przestrzeni kosmicznej.
space-chest-muluna=Skrzynia, w której można przechowywać niewielki zapas przedmiotów poza ładownią statku.
muluna-cycling-steam-turbine=Bardziej wydajna turbina parowa, która pozwala na skraplanie części zużytej pary z powrotem do postaci wody w celu ponownego podgrzania. Preferuje parę o bardziej suchej jakości./n https://pl.wikipedia.org/wiki/Stopie%C5%84_sucho%C5%9Bci_pary
#Note for localisers: quality here is a thermodynamics joke. If the joke doesn't translate to your language, don't include it. https://en.wikipedia.org/wiki/Vapor_quality
#done :)
muluna-oxygen=Jeśli mamy tu coś spalać, będziemy musieli wytworzyć własny tlen.
muluna-wood-cultivation=Uprawa [item=wood] w [entity=chemical-plant]. Łatwe do skonfigurowania, ale powolne. Zużywa [fluid=carbon-dioxide] i wytwarza [fluid=oxygen].
muluna-greenhouses=Specjalne szklarnie mogą produkować [item=wood] i [fluid=oxygen] mznacznie szybciej niż zakłady chemiczne, ale przed użyciem należy je obsadzić [item=muluna-sapling].
muluna-gas-venting=Chociaż [item=wood] jest doskonałym pochłaniaczem dwutlenku węgla, samo w sobie nie jest w stanie utrzymać stabilnej elektrowni. W sytuacjach awaryjnych należy odprowadzić nadmiar gazu, aby zapobiec spadkowi napięcia.
muluna-fertilized-greenhouses=Składniki odżywcze z [planet=gleba] pozwalają nam zwiększyć plony [item=wood] w [entity=muluna-greenhouse-wood].
muluna-fertilized-greenhouses-vulcanus=Fluoroketon z [planet=aquilo] pozwala nam uprawiać drzewa na dowolnej powierzchni i jeszcze bardziej zwiększyć plony [item=wood] w [entity=muluna-greenhouse-wood].
asteroid-productivity=Zwiększona wydajność kruszenia asteroid na platformach kosmicznych oraz na [planet=muluna].
asteroid-reprocessing=Przetwarzanie zanieczyszczeń zawartych w asteroidach w celu uzyskania bardziej zrównoważonego zestawu surowców na platformach kosmicznych oraz na [planet=muluna].
advanced-asteroid-processing=Uzyskiwanie szerszego zakresu surowców z asteroid na platformach kosmicznych oraz na [planet=muluna].
automation-3=Maszyny montażowe zdolne do przetwarzania składników płynnych i danych, ze zwiększoną prędkością i gniazdami na moduły.
muluna-space-telescope=Dane astronomiczne pozyskane z Rozbitej Planety.
x-asteroid-crushing=Rozdrabnianie asteroid w kruszarce lub ręcznie.

[technology-effect]
