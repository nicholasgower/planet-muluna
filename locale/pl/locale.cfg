[mod-description]
planet-muluna=Odkryj księżyc Nauvis – Muluna – skupiając się na kruszeniu asteroid, postaw swój pierwszy krok w kosmosie. Odkryj nowe zastosowania kruszarek, które są teraz dostępne na wszystkich powierzchniach. Skorzystaj z pakietu naukowego „Eksploracja”, aby ulepszyć swoje platformy kosmiczne i dotrzeć jeszcze głębiej w kosmos.


[space-location-name]
muluna=Muluna


[space-location-description]
muluna=Największy naturalny satelita Nauvis. Powierzchnia jest pozbawiona życia, ale bogata w metale i minerały. Miedź nie jest łatwo dostępna, ale aluminium może służyć jako substytut większości rzeczy. Rośliny mogą tu rosnąć z wielkim trudem.


