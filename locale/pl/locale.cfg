[item-description]
muluna-satellite-radar=Działa jak radar o nieograniczonym zasięgu, wyświetlając odległy widok graczy na planetach, wokół których orbituje radar satelitarny. Zużywa energię tylko podczas użytkowania. Radary wyższej jakości wyświetlają więcej kafelków i zużywają mniej energii na każdy wyświetlany kafelek.
muluna-greenhouse=Przed umieszczeniem musi zostać zasiany konkretną uprawą w maszynie montażowej.
low-density-space-platform-foundation=Dwa razy bardziej wytrzymałe i o połowę mniej gęste niż standardowe fundamenty platform kosmicznych.
muluna-microcellular-plastic=Tworzywo sztuczne zawierające miliardy mikroskopijnych otworów. Posiada niezwykłe właściwości materiałowe.
muluna-diffused-plastic=Tworzywo sztuczne nasycone dwutlenkiem węgla. Dwutlenek węgla nie utrzyma się w tworzywie zbyt długo, zwłaszcza bez zastosowania bardziej zaawansowanych technik produkcji. Kluczem do zmniejszenia wskaźnika awaryjności mogą być wytrzymalsze metale lub lepsze zakłady chemiczne.

[alert]
nav-beacon-available=Radar satelitarny krążący wokół __1__.\nZa pomocą tego radaru można zdalnie obserwować cały ląd.\nWyłącz ten alert w ustawieniach modów dla poszczególnych graczy.


[cant-build-reason]
no-resource-for-drill=


[entity-description]
muluna-advanced-boiler=Kocioł, który może działać w środowiskach pozbawionych tlenu, takich jak [planet=muluna] oraz na stacjach kosmicznych.
space-heating-tower=Wieża grzewcza zdolna do pracy w środowiskach beztlenowych, takich jak [planet=muluna], oraz na platformach kosmicznych.
muluna-cycling-steam-turbine=Bardziej wydajna turbina parowa, która umożliwia skraplanie części zużytej pary z powrotem do postaci wody w celu ponownego podgrzania. Preferuje parę o bardziej suchej jakości.\n[fluid=steam] Maks. temperatura: 500 °C\n[fluid=cooled-steam] temperatura: 100 °C
muluna-rocket-buggy=Większy, szybszy pojazd wyposażony w wyrzutnię rakiet i siatkę na sprzęt.
muluna-vacuum-heating-tower=Wytwarza ciepło z paliw chemicznych z jeszcze większą wydajnością. Może być używany na wszystkich powierzchniach, ale zużywa [fluid=oxygen] i wytwarza [fluid=carbon-dioxide].
muluna-telescope-combinator=Wpatruje się w kosmos, zbierając informacje o otoczeniu teleskopu.\nNa planetach:\n[img=quality.normal]: Indeks każdej platformy kosmicznej na orbicie\n[img=quality.uncommon]: Stan każdej platformy kosmicznej na orbicie\n[img=quality.rare]: Jeśli (2) lub jeśli nie (1), każda platforma na orbicie może odlecieć\nNa platformach:\n[img=virtual-signal.signal-I]: Indeks platformy kosmicznej\n[img=virtual-signal.signal-X]: Jeśli na połączeniu kosmicznym, aktualna pozycja wzdłuż połączenia kosmicznego\n[img=virtual-signal.signal-L]:Jeśli na połączeniu kosmicznym, całkowita długość połączenia kosmicznego\nTeleskop będzie również wysyłał sygnał dla każdej asteroidy otaczającej platformę. Podkomponent [entity=muluna-telescope].
muluna-telescope=Obserwuje wszechświat, generując dane astronomiczne. Wytwarza więcej danych w bardziej egzotycznych lokalizacjach. Generuje również sygnały obwodów za pośrednictwem [entity=muluna-telescope-combinator]. Na każdej planecie można umieścić tylko jeden teleskop, ale nie ma ograniczeń dotyczących platform kosmicznych.
muluna-crusher=Kruszarka napędzana silnikiem elektrycznym. Kruszy przedmioty z większą wydajnością energetyczną.


